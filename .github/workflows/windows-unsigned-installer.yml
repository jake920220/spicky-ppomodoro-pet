name: Build Windows Unsigned Installer

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "업로드할 GitHub Release 태그. 비워두면 아티팩트만 생성합니다."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-nsis:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: spiky-ppomodoro-pet-windows-unsigned
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ inputs.release_tag }}" src-tauri/target/release/bundle/nsis/*.exe --clobber
